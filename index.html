<meta charset="utf-8" />

<link rel="apple-touch-icon" href="images/logo-transparent.png" />

<meta property="og:image" content="https://geula-retreats.com/images/gallery-cover.jpg" />

<meta name="twitter:title" content="גאולה ריטריט" />
<meta name="twitter:description" content="גאולה ריטריט - טיולי גלישה בספוטים הטובים בעולם" />
<meta name="twitter:image" content="https://geula-retreats.com/images/gallery-cover.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e2a33;
  --ink-soft:#345963;
  --cream:#f7efe1;
  --cream-2:#fbf6ec;
  --sand:#e8d9bc;
  --teal:#1e7a8c;
  --teal-deep:#0b4d5c;
  --coral:#e89770;
  --coral-soft:#f5cdb6;
  --sun:#f2c14e;
  --shadow:0 20px 40px -22px rgba(14,42,51,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Rubik',system-ui,sans-serif;
  color:var(--ink);
  background:var(--cream-2);
  line-height:1.65;
  text-align:center;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.serif{font-family:'Rubik',system-ui,sans-serif;font-weight:800;letter-spacing:-.015em;line-height:1.15}
h1{font-size:clamp(2.4rem,6vw,4.8rem);font-weight:900;letter-spacing:-.025em}
h2{font-size:clamp(1.9rem,4vw,3.1rem)}
h3{font-size:1.3rem;font-weight:700}
p{margin:.6em auto}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%;height:auto}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.btn{
  display:inline-flex;align-items:center;gap:.55rem;
  padding:14px 26px;border-radius:999px;
  font-weight:600;font-size:.98rem;letter-spacing:.01em;
  border:1.5px solid transparent;transition:transform .2s ease, background .2s ease, color .2s ease;
  cursor:pointer;background:var(--ink);color:var(--cream);
  font-family:inherit;
}
.btn:hover{transform:translateY(-2px)}
.btn.coral{background:var(--coral);color:#fff}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--ink)}
.btn.ghost:hover{background:var(--ink);color:var(--cream)}
.eyebrow{display:inline-block;font-family:'Rubik',sans-serif;text-transform:uppercase;letter-spacing:.2em;font-size:.78rem;color:var(--teal-deep);font-weight:600}
em{font-style:normal;color:var(--coral);font-weight:900}

/* PROMO BAR */
.promo{
  background:var(--ink);color:var(--cream);
  font-size:.88rem;text-align:center;padding:9px 12px;letter-spacing:.02em;
}
.promo b{color:var(--sun)}

/* NAV */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(251,246,236,.86);
  backdrop-filter:saturate(140%) blur(10px);
  -webkit-backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid rgba(14,42,51,.08);
}
.nav .row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:20px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.4rem}
.brand .dot{width:10px;height:10px;background:var(--coral);border-radius:50%;display:inline-block;box-shadow:0 0 0 4px rgba(232,151,112,.22)}
.brand img.logo{height:120px;width:auto;display:block}
@media (max-width:980px){.brand img.logo{height:90px}}
@media (max-width:520px){.brand img.logo{height:70px}}
.nav ul{display:flex;gap:26px;list-style:none;padding:0;margin:0;font-size:.95rem;font-weight:500}
.nav ul a:hover{color:var(--coral)}
.nav-cta{display:flex;gap:10px;align-items:center}
.lang-toggle{
  background:transparent;border:1.5px solid var(--ink);color:var(--ink);
  padding:8px 14px;border-radius:999px;font-weight:600;font-size:.82rem;
  letter-spacing:.08em;cursor:pointer;font-family:inherit;transition:background .2s, color .2s;
}
.lang-toggle:hover{background:var(--ink);color:var(--cream)}
.nav-book{padding:8px 16px;font-size:.82rem;font-weight:600;white-space:nowrap;line-height:1.2}
@media (max-width:520px){
  .nav-book{padding:7px 12px;font-size:.7rem;max-width:130px;white-space:normal;text-align:center}
}
.menu-btn{display:none;background:none;border:0;font-size:1.6rem;color:var(--ink);cursor:pointer;padding:4px 8px;line-height:1;font-family:inherit}
@media (max-width:980px){
  .nav ul{display:none}
  .menu-btn{display:block}
}
.mobile-menu{
  display:none;
  border-top:1px solid rgba(14,42,51,.08);
  background:rgba(251,246,236,.98);
  backdrop-filter:saturate(140%) blur(10px);
  -webkit-backdrop-filter:saturate(140%) blur(10px);
}
.mobile-menu.open{display:block}
.mobile-menu ul{list-style:none;padding:8px 24px 16px;margin:0;display:flex;flex-direction:column;gap:4px;text-align:center}
.mobile-menu li{border-bottom:1px solid rgba(14,42,51,.06)}
.mobile-menu li:last-child{border-bottom:0}
.mobile-menu a{
  display:block;padding:14px 4px;
  font-size:1.05rem;font-weight:600;color:var(--ink);
  text-align:center;transition:color .2s ease;
}
.mobile-menu a:hover{color:var(--coral)}
@media (min-width:981px){.mobile-menu{display:none !important}}

/* HERO */
.hero{
  position:relative;height:min(92vh,820px);min-height:560px;
  display:flex;align-items:flex-end;
  background:#0b4d5c url('images/REKA.jpeg') center/cover no-repeat;
  color:#fff;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(11,77,92,.10) 0%,rgba(11,77,92,.05) 40%,rgba(14,42,51,.55) 100%);
}
.hero-inner{position:relative;z-index:2;padding-bottom:64px;width:100%}
.hero h1{max-width:18ch;margin:0 auto;text-shadow:0 2px 30px rgba(0,0,0,.25)}
.hero h1 em{color:var(--sun)}
.hero .lead{max-width:52ch;font-size:1.12rem;margin:18px auto 28px;color:#f3ead8}
.hero .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hero-inner{text-align:center}
.hero .badge{
  position:absolute;top:28px;inset-inline-end:24px;z-index:3;
  background:rgba(251,246,236,.95);color:var(--ink);
  font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:10px 16px;border-radius:999px;
  transform:rotate(3deg);box-shadow:var(--shadow);
}
html[dir="rtl"] .hero .badge{transform:rotate(-3deg)}
.scroll-cue{
  position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
  color:#fbf6ec;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;opacity:.85;
}
.scroll-cue::after{content:"";display:block;width:1px;height:36px;margin:8px auto 0;background:#fbf6ec;opacity:.7;animation:cue 1.8s ease-in-out infinite}
@keyframes cue{0%,100%{transform:scaleY(.4);transform-origin:top}50%{transform:scaleY(1)}}

/* MARQUEE STRIP */
.strip{
  background:var(--coral);color:#fff;
  padding:18px 0;overflow:hidden;white-space:nowrap;
  font-size:1.2rem;font-weight:600;letter-spacing:.01em;
}
.strip span{display:inline-block;padding:0 28px;animation:scroll 32s linear infinite}
.strip span::after{content:" · ";color:rgba(255,255,255,.5);margin:0 8px}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* INTRO */
.intro{padding:60px 0 40px}
.intro .grid{display:grid;grid-template-columns:1fr;gap:28px;align-items:center;max-width:780px;margin:0 auto}
.intro h2{margin:8px auto 14px;max-width:22ch;color:var(--coral)}
.intro p{font-size:1.08rem;color:var(--ink-soft);max-width:58ch;margin:.6em auto}
.intro .photo{
  position:relative;border-radius:22px;overflow:hidden;
  box-shadow:var(--shadow);transform:rotate(-1deg);
  max-width:440px;margin:0 auto;
}
html[dir="rtl"] .intro .photo{transform:rotate(1deg)}
.intro .photo img{aspect-ratio:4/3;object-fit:cover;width:100%}
.intro .photo .tape{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);
  width:120px;height:28px;background:rgba(242,193,78,.7);
}
.signature{margin-top:24px;color:var(--teal-deep);font-size:1.1rem;font-weight:600}

/* WHY / BENEFITS */
.why{background:var(--cream);padding:100px 0;border-radius:32px 32px 0 0}
.why .head{margin-bottom:50px;max-width:780px;margin-inline:auto}
.why h2{max-width:22ch;margin:8px auto 14px}
.why .head p{max-width:44ch;color:var(--ink-soft);margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.card{
  background:var(--cream-2);border-radius:20px;padding:28px;
  border:1px solid rgba(14,42,51,.08);
  transition:transform .25s ease, box-shadow .25s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.card .ico{
  width:48px;height:48px;border-radius:14px;background:var(--sand);
  display:grid;place-items:center;margin:0 auto 18px;color:var(--teal-deep);
}
.card h3{margin:0 0 8px;font-size:1.2rem}
.card p{margin:0;font-size:.95rem;color:var(--ink-soft)}
@media (max-width:880px){.cards{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.cards{grid-template-columns:1fr}}

/* GALLERY */
.gallery{padding:60px 0}
.gallery .head{text-align:center;margin-bottom:32px}
.gallery h2{margin:8px auto 18px;max-width:22ch}
.gallery .head p{color:var(--ink-soft);max-width:48ch;margin:0 auto}
/* GALLERY SLIDER (makai-style) */
.gallery-slider-wrap{
  position:relative;overflow:hidden;
  min-height:640px;
  width:100vw;margin-inline-start:calc(50% - 50vw);margin-inline-end:calc(50% - 50vw);
  border-radius:0;
  box-shadow:0 30px 60px -28px rgba(14,42,51,.45);
}
.gallery-slider-bg{
  position:absolute;inset:0;background-size:cover;background-position:center 78%;
  filter:brightness(.7);
}
.gallery-slider-bg::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(14,42,51,.15) 0%,rgba(14,42,51,.35) 100%);
}
.gallery-slider{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:32px;
  padding:120px 80px 120px;min-height:640px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.gallery-slider::-webkit-scrollbar{display:none}
.gallery-slider figure{
  flex:0 0 auto;height:380px;margin:0;cursor:zoom-in;
  scroll-snap-align:center;border-radius:8px;overflow:hidden;
  box-shadow:0 24px 46px -14px rgba(0,0,0,.6);
  transition:transform .3s ease;
}
.gallery-slider figure:hover{transform:scale(1.03)}
.gallery-slider figure img{
  height:100%;width:auto;display:block;
  image-orientation:from-image;
}
.gallery-arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:5;
  width:54px;height:54px;border-radius:50%;border:0;cursor:pointer;
  background:rgba(255,255,255,.18);color:#fff;
  display:grid;place-items:center;font-family:inherit;
  transition:background .2s ease, transform .2s ease;
  backdrop-filter:blur(6px);
}
.gallery-arrow:hover{background:rgba(255,255,255,.4);transform:translateY(-50%) scale(1.08)}
.gallery-arrow svg{width:22px;height:22px}
.gallery-arrow.prev{inset-inline-start:18px}
.gallery-arrow.next{inset-inline-end:18px}
html[dir="rtl"] .gallery-arrow.prev svg{transform:scaleX(-1)}
html[dir="rtl"] .gallery-arrow.next svg{transform:scaleX(-1)}
.gallery-dots{display:none}
.gallery-cta-btn{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:5;
  display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:var(--ink);border:0;cursor:pointer;
  padding:14px 28px;border-radius:999px;
  font-size:.98rem;font-weight:700;letter-spacing:.01em;font-family:inherit;
  box-shadow:0 14px 26px -10px rgba(0,0,0,.4);
  transition:background .25s ease, color .25s ease, transform .25s ease;
}
.gallery-cta-btn:hover{background:var(--coral);color:#fff;transform:translateX(-50%) translateY(-2px)}
.gallery-cta-btn svg{width:18px;height:18px;flex-shrink:0}
@media(max-width:768px){
  .gallery-slider-wrap{min-height:500px}
  .gallery-slider{padding:70px 18px 100px;min-height:500px;gap:16px}
  .gallery-slider figure{height:290px}
  .gallery-arrow{width:42px;height:42px}
  .gallery-arrow.prev{inset-inline-start:8px}
  .gallery-arrow.next{inset-inline-end:8px}
}

/* LIGHTBOX */
.lightbox{
  position:fixed;inset:0;z-index:200;
  background:rgba(14,42,51,.92);backdrop-filter:blur(8px);
  display:none;overflow-y:auto;padding:60px 24px 80px;
}
.lightbox.open{display:block}
body.lightbox-open{overflow:hidden}
.lightbox-close{
  position:fixed;top:18px;inset-inline-end:18px;z-index:210;
  width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;
  background:rgba(255,255,255,.18);color:#fff;
  font-size:1.6rem;line-height:1;font-family:inherit;
  display:grid;place-items:center;transition:background .2s ease;
}
.lightbox-close:hover{background:var(--coral)}
.lightbox-grid{
  max-width:1100px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:170px;
  gap:12px;grid-auto-flow:dense;
}
.lightbox-grid figure{
  margin:0;border-radius:14px;overflow:hidden;
  box-shadow:0 14px 30px -22px rgba(0,0,0,.5);
}
.lightbox-grid img{
  width:100%;height:100%;object-fit:cover;display:block;
  image-orientation:from-image;
}
.lightbox-grid figure.surf{grid-column:span 2;grid-row:span 2}
.lightbox-grid figure.wide{grid-column:span 2;grid-row:span 1}
.lightbox-grid figure.tall{grid-column:span 1;grid-row:span 2}
@media (max-width:880px){
  .lightbox-grid{grid-template-columns:repeat(3,1fr);grid-auto-rows:140px;gap:10px}
}
@media (max-width:520px){
  .lightbox{padding:50px 14px 60px}
  .lightbox-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:130px;gap:8px}
}

/* FULLSCREEN IMAGE VIEWER */
.img-fullscreen{
  position:fixed;inset:0;z-index:300;
  background:rgba(14,42,51,.96);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  padding:32px;cursor:zoom-out;
}
.img-fullscreen.open{display:flex}
.img-fullscreen img{
  max-width:100%;max-height:100%;
  width:auto;height:auto;
  object-fit:contain;
  border-radius:8px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
  animation:fsPop .25s ease;
}
@keyframes fsPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.img-fullscreen-close{
  position:fixed;top:18px;inset-inline-end:18px;z-index:310;
  width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;
  background:rgba(255,255,255,.18);color:#fff;
  font-size:1.6rem;line-height:1;font-family:inherit;
  display:grid;place-items:center;transition:background .2s ease;
}
.img-fullscreen-close:hover{background:var(--coral)}
.lightbox-grid figure{cursor:zoom-in}

/* DESTINATIONS */
.destinations{padding:60px 0;background:var(--cream-2)}
.destinations .head{margin-bottom:30px;max-width:780px;margin-inline:auto}
.destinations h2{margin:8px auto 14px;max-width:22ch}
.destinations .head p{color:var(--ink-soft);max-width:48ch;margin:0 auto}
.dest-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.dest{
  position:relative;display:flex;flex-direction:column;justify-content:flex-end;
  aspect-ratio:3/4;border-radius:22px;overflow:hidden;
  background-size:cover;background-position:center;
  color:#fff;padding:24px 20px;
  box-shadow:var(--shadow);
  transition:transform .35s ease, box-shadow .35s ease;
  text-decoration:none;
}
.dest::before{
  content:"";position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg,rgba(11,77,92,.10) 30%, rgba(11,77,92,.85) 100%);
}
.dest > *{position:relative;z-index:1}
.dest:hover{transform:translateY(-6px);box-shadow:0 28px 50px -20px rgba(14,42,51,.55)}
.dest-tag{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:2;
  background:var(--coral);color:#fff;
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  padding:6px 12px;border-radius:999px;font-weight:700;white-space:nowrap;
}
.dest h3{font-size:1.7rem;font-weight:800;margin:0 0 4px;color:#fff;line-height:1.1}
.dest-country{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-bottom:8px;display:block}
.dest-desc{margin:0;font-size:.95rem;opacity:.92;line-height:1.45}
@media (max-width:980px){.dest-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){
  .dest-grid{grid-template-columns:1fr;display:flex;flex-direction:column}
  .dest{aspect-ratio:4/3}
  .dest:nth-child(1){order:4}  /* El Salvador → last */
  .dest:nth-child(2){order:2}  /* Bali → 2nd */
  .dest:nth-child(3){order:1}  /* Panama → 1st */
  .dest:nth-child(4){order:3}  /* Siargao → 3rd */
}

/* LEVELS */
.levels{padding:110px 0;background:var(--teal-deep);color:var(--cream)}
.levels .head{margin-bottom:50px;max-width:780px;margin-inline:auto}
.levels h2{margin:8px auto 14px;max-width:22ch}
.levels .eyebrow{color:var(--sun)}
.levels .head p{color:rgba(247,239,225,.78);max-width:44ch;margin:0 auto}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.level{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;padding:30px;display:flex;flex-direction:column;
  transition:background .25s ease, transform .25s ease;
}
.level:hover{background:rgba(255,255,255,.09);transform:translateY(-4px)}
.level .num{font-size:2.8rem;color:var(--sun);line-height:1;margin-bottom:14px;font-weight:900}
.level h3{color:#fff;margin:0 0 6px}
.level .tag{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--coral-soft);margin-bottom:18px;font-weight:600}
.level ul{list-style:none;padding:0;margin:0 0 22px;font-size:.95rem;color:rgba(247,239,225,.85)}
.level li{padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.12)}
.level li:last-child{border-bottom:0}
.level .price{margin-top:auto;font-size:1.45rem;font-weight:800}
.level .price small{color:rgba(247,239,225,.6);font-size:.85rem;font-weight:400}
@media (max-width:880px){.level-grid{grid-template-columns:1fr}}

/* DAY */
.day{padding:60px 0;background:var(--cream)}
.day .grid{display:grid;grid-template-columns:1fr;gap:28px;align-items:center;max-width:780px;margin:0 auto}
.day h2{margin:8px auto 14px;max-width:24ch}
.day .grid > div > p{color:var(--ink-soft);max-width:48ch;margin:0 auto}
.day .photo{border-radius:22px;overflow:hidden;transform:rotate(1deg);box-shadow:var(--shadow);max-width:520px;margin:0 auto}
html[dir="rtl"] .day .photo{transform:rotate(-1deg)}
.day .photo img{aspect-ratio:4/3;object-fit:cover;width:100%}
.timeline{
  margin:40px auto 0;border:0;padding:0;max-width:480px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  list-style:none;
}
.timeline .step{
  padding:14px 28px;background:#fff;
  border:1.5px solid rgba(232,151,112,.4);
  border-radius:999px;width:100%;max-width:420px;
  box-shadow:0 10px 22px -16px rgba(232,151,112,.45);
  transition:transform .25s ease, background .25s ease, box-shadow .25s ease;
}
.timeline .step:hover{
  transform:translateY(-2px) scale(1.02);
  background:var(--coral);
  box-shadow:0 16px 30px -14px rgba(232,151,112,.6);
}
.timeline .step:hover p{color:#fff}
.timeline .step p{
  margin:0;color:var(--coral);
  font-size:1.25rem;font-weight:800;letter-spacing:-.01em;line-height:1.25;
  text-align:center;transition:color .25s ease;
}
.timeline .step:last-child{
  margin-top:14px;max-width:460px;
  background:transparent;border-style:dashed;border-radius:18px;
  box-shadow:none;
}
.timeline .step:last-child:hover{background:rgba(232,151,112,.08)}
.timeline .step:last-child:hover p{color:var(--coral)}
.timeline .step:last-child p{font-size:1rem;font-weight:600;font-style:italic;opacity:.9}
@media(max-width:520px){
  .timeline .step{padding:12px 22px}
  .timeline .step p{font-size:1.08rem}
}
@media (max-width:880px){.day .grid{gap:40px}}

/* TESTIMONIAL */
.quote{
  position:relative;padding:90px 0;color:#fff;text-align:center;
  background:linear-gradient(180deg,rgba(14,42,51,.55),rgba(14,42,51,.55)),
             url('images/beach-palm-couple.jpg') center/cover no-repeat;
}
.quote blockquote{
  font-size:clamp(1.4rem,2.4vw,2rem);
  max-width:36ch;margin:0 auto;line-height:1.4;font-weight:600;
}
.quote .author{margin-top:24px;letter-spacing:.16em;text-transform:uppercase;font-size:.8rem;opacity:.85;font-weight:600}

/* FAQ */
.faq{padding:60px 0}
.faq .grid{display:grid;grid-template-columns:1fr;gap:20px;max-width:780px;margin:0 auto}
.faq h2{margin:8px auto 12px;max-width:24ch}
.faq .grid > div:first-child p{color:var(--ink-soft);max-width:44ch;margin:0 auto}
.acc-item{border-top:1px solid rgba(14,42,51,.15)}
.acc-item:last-child{border-bottom:1px solid rgba(14,42,51,.15)}
.acc-item summary{list-style:none;cursor:pointer;position:relative}
.acc-item summary::-webkit-details-marker{display:none}
.acc-item .head-row{
  width:100%;padding:22px 56px;
  font-size:1.12rem;font-weight:700;color:var(--ink);
  display:flex;justify-content:center;align-items:center;gap:14px;
  position:relative;text-align:center;
}
.acc-item .plus{
  position:absolute;inset-inline-end:0;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--ink);
  display:grid;place-items:center;font-size:1.2rem;transition:transform .25s ease, background .25s ease, color .25s ease;flex-shrink:0;
}
.acc-item[open] .plus{background:var(--coral);border-color:var(--coral);color:#fff;transform:translateY(-50%) rotate(45deg)}
.acc-item .body{padding:0 0 22px;color:var(--ink-soft);max-width:62ch;margin:0 auto}

/* CTA */
.cta{
  margin:0 24px 16px;padding:50px 24px;border-radius:28px;
  background:transparent;color:var(--coral);
  text-align:center;position:relative;overflow:hidden;
}
.cta h2{max-width:22ch;margin:14px auto 24px;color:var(--coral)}
.cta p{max-width:48ch;margin:0 auto 28px;color:var(--coral);opacity:.85}
.cta .btn{background:var(--coral);color:#fff;border-color:var(--coral)}
.cta .btn:hover{background:#d27e5a;border-color:#d27e5a}
.cta .sun{display:none}

/* FOOTER */
footer{background:var(--ink);color:rgba(247,239,225,.78);padding:70px 0 30px}
footer .grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px;justify-items:center}
footer .brand{color:#fff;margin-bottom:14px;justify-content:center}
footer h4{color:#fff;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;margin:0 0 16px;font-weight:700}
footer ul{list-style:none;padding:0;margin:0;display:grid;gap:10px;font-size:.95rem}
footer ul a:hover{color:var(--sun)}
footer .legal{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;flex-direction:column;align-items:center;gap:10px;font-size:.85rem}
@media (max-width:880px){footer .grid{grid-template-columns:1fr 1fr}}
@media (max-width:520px){footer .grid{grid-template-columns:1fr}}

/* MISSING ANSWER STRIP */
.missing-answer{padding:30px 0 36px;text-align:center}
.missing-answer p{margin:0;color:var(--ink-soft);font-size:1rem;max-width:46ch;margin-inline:auto}
.missing-answer p a{color:var(--coral);font-weight:600}

/* END IMAGE */
.end-image{margin:0;padding:0;line-height:0}
.end-image img{
  width:100%;height:auto;display:block;
  max-height:70vh;object-fit:cover;
  border-radius:0;
}
@media(max-width:520px){
  .end-image img{max-height:60vh}
}

/* COMING SOON MODAL */
.coming-modal{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  padding:24px;
}
.coming-modal.open{display:flex}
.coming-modal::before{
  content:"";position:absolute;inset:0;
  background:url('images/bali-3.jpg') center/cover no-repeat;
  filter:brightness(.55);
}
.coming-modal::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(11,77,92,.4) 0%,rgba(14,42,51,.7) 100%);
  backdrop-filter:blur(2px);
}
.coming-card{
  position:relative;z-index:2;
  background:rgba(255,255,255,.96);color:var(--ink);
  border-radius:24px;padding:60px 40px 50px;
  max-width:520px;width:100%;text-align:center;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.5);
  animation:comingPop .35s ease;
}
@keyframes comingPop{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.coming-close{
  position:absolute;top:14px;inset-inline-end:14px;
  width:36px;height:36px;border-radius:50%;border:0;cursor:pointer;
  background:transparent;color:var(--ink);font-size:1.6rem;line-height:1;
  font-family:inherit;display:grid;place-items:center;
  transition:background .2s ease;
}
.coming-close:hover{background:rgba(0,0,0,.08)}
.coming-content h2{
  font-size:clamp(2.4rem,5vw,3.4rem);
  color:var(--coral);margin:0 0 16px;letter-spacing:-.02em;
  font-weight:900;
}
.coming-content p{
  font-size:1.05rem;color:var(--ink-soft);margin:0 0 28px;
  line-height:1.6;
}
.coming-cta{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--coral);color:#fff;text-decoration:none;
  padding:14px 28px;border-radius:999px;
  font-weight:700;font-size:1rem;letter-spacing:.01em;
  box-shadow:0 14px 26px -10px rgba(232,151,112,.6);
  transition:background .25s ease, transform .25s ease;
}
.coming-cta:hover{background:#d27e5a;transform:translateY(-2px)}
@media(max-width:520px){
  .coming-card{padding:50px 28px 40px;border-radius:20px}
  .coming-content p{font-size:.98rem}
}

/* PDF MODAL */
.pdf-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(14,42,51,.85);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  padding:24px;
}
.pdf-modal.open{display:flex}
body.pdf-open{overflow:hidden}
.pdf-modal-card{
  background:#fff;color:var(--ink);
  width:100%;max-width:980px;height:92vh;
  border-radius:20px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.55);
  animation:pdfPop .25s ease;
}
@keyframes pdfPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.pdf-modal-head{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 22px;border-bottom:1px solid rgba(0,0,0,.08);
  background:var(--cream-2);
}
.pdf-modal-head h3{margin:0;font-size:1.1rem;font-weight:800;color:var(--ink)}
.pdf-actions{display:flex;align-items:center;gap:8px}
.pdf-download{
  display:grid;place-items:center;width:40px;height:40px;border-radius:50%;
  background:var(--coral);color:#fff;text-decoration:none;
  transition:background .2s ease, transform .2s ease;
}
.pdf-download:hover{background:#d27e5a;transform:scale(1.08)}
.pdf-download svg{width:20px;height:20px}
.pdf-close{
  background:transparent;border:0;cursor:pointer;
  width:40px;height:40px;border-radius:50%;
  display:grid;place-items:center;font-size:1.6rem;line-height:1;
  color:var(--ink);font-family:inherit;
  transition:background .2s ease;
}
.pdf-close:hover{background:rgba(0,0,0,.08)}
.pdf-frame{
  flex:1;width:100%;border:0;background:#f5f5f5;display:block;
}
@media(max-width:520px){
  .pdf-modal{padding:0}
  .pdf-modal-card{height:100vh;max-width:none;border-radius:0}
  .pdf-modal-head{padding:12px 16px}
  .pdf-modal-head h3{font-size:.95rem}
}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .8s ease, transform .8s ease}
.reveal.in{opacity:1;transform:none}

function setLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  document.title = lang === 'he'
    ? 'גאולה ריטריטס — בקרים שקטים, גלים ארוכים, חברים אמיתיים'
    : 'Geula Retreats — Slow mornings, long waves, real friends';
  const dict = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k] !== undefined) el.innerHTML = dict[k];
  });
  const toggle = document.querySelector('.lang-toggle');
  if(toggle) toggle.textContent = lang === 'he' ? 'EN' : 'עב';
  try{ localStorage.setItem('lang', lang); }catch(e){}
}

const saved = (function(){ try{ return localStorage.getItem('lang'); }catch(e){ return null; } })();
setLang(saved || 'he');

document.querySelector('.lang-toggle').addEventListener('click', ()=>{
  setLang(document.documentElement.lang === 'he' ? 'en' : 'he');
});

// scroll reveal
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
},{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

// mobile hamburger menu
const menuBtn = document.getElementById('menuBtn');
const mobileMenu = document.getElementById('mobileMenu');
function closeMobileMenu(){
  if(!mobileMenu) return;
  mobileMenu.classList.remove('open');
  mobileMenu.setAttribute('aria-hidden','true');
  if(menuBtn) menuBtn.setAttribute('aria-expanded','false');
}
if(menuBtn && mobileMenu){
  menuBtn.addEventListener('click', ()=>{
    const open = mobileMenu.classList.toggle('open');
    mobileMenu.setAttribute('aria-hidden', open ? 'false' : 'true');
    menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  mobileMenu.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click', closeMobileMenu);
  });
}

    if(t){ e.preventDefault(); t.scrollIntoView({behavior:'smooth', block:'start'}); }

});

// PDF modal for destinations
const pdfModal = document.getElementById('pdfModal');
const pdfFrame = document.getElementById('pdfFrame');
const pdfTitle = document.getElementById('pdfTitle');
const pdfDownload = document.getElementById('pdfDownload');
const pdfClose = pdfModal ? pdfModal.querySelector('.pdf-close') : null;
const isMobilePdf = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.matchMedia('(max-width: 768px)').matches;
function openPdf(src, title){
  if(isMobilePdf){
    // Mobile browsers (especially iOS) don't render PDFs in iframes well — open native viewer in new tab
    window.open(src, '_blank');
    return;
  }
  if(!pdfModal) return;
  pdfFrame.src = src + '#view=FitH';
  pdfTitle.textContent = title || 'ברושור';
  pdfDownload.href = src;
  pdfModal.classList.add('open');
  pdfModal.setAttribute('aria-hidden','false');
  document.body.classList.add('pdf-open');
}
function closePdf(){
  if(!pdfModal) return;
  pdfModal.classList.remove('open');
  pdfModal.setAttribute('aria-hidden','true');
  document.body.classList.remove('pdf-open');
  setTimeout(()=>{ pdfFrame.src=''; }, 300);
}
document.querySelectorAll('.dest[data-pdf]').forEach(card=>{
  card.addEventListener('click', e=>{
    e.preventDefault();
    openPdf(card.getAttribute('data-pdf'), card.getAttribute('data-title'));
  });
});
if(pdfClose) pdfClose.addEventListener('click', closePdf);
if(pdfModal) pdfModal.addEventListener('click', e=>{ if(e.target===pdfModal) closePdf(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && pdfModal && pdfModal.classList.contains('open')) closePdf(); });

// Accessibility widget
const a11yToggle = document.getElementById('a11yToggle');
const a11yPanel = document.getElementById('a11yPanel');
const a11yClose = a11yPanel ? a11yPanel.querySelector('.a11y-close') : null;
let a11ySettings = {};
try{ a11ySettings = JSON.parse(localStorage.getItem('a11y') || '{}'); }catch(e){ a11ySettings = {}; }
function applyA11y(){
  const h = document.documentElement;
  h.classList.toggle('a11y-font-up', a11ySettings.fontUp === 1);
  h.classList.toggle('a11y-font-up-2', a11ySettings.fontUp >= 2);
  h.classList.toggle('a11y-grayscale', !!a11ySettings.grayscale);
  h.classList.toggle('a11y-high-contrast', !!a11ySettings.contrast);
  h.classList.toggle('a11y-links', !!a11ySettings.links);
  h.classList.toggle('a11y-no-motion', !!a11ySettings.motion);
  document.querySelectorAll('.a11y-opt').forEach(btn=>{
    const a = btn.getAttribute('data-action');
    let active = false;
    if(a==='font-up') active = (a11ySettings.fontUp||0) >= 1;
    if(a==='contrast') active = !!a11ySettings.contrast;
    if(a==='grayscale') active = !!a11ySettings.grayscale;
    if(a==='links') active = !!a11ySettings.links;
    if(a==='motion') active = !!a11ySettings.motion;
    btn.classList.toggle('active', active);
  });
}
if(a11yToggle){
  a11yToggle.addEventListener('click', ()=>{
    const open = a11yPanel.classList.toggle('open');
    a11yToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    a11yPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
  });
}
if(a11yClose){
  a11yClose.addEventListener('click', ()=>{
    a11yPanel.classList.remove('open');
    a11yToggle.setAttribute('aria-expanded','false');
    a11yPanel.setAttribute('aria-hidden','true');
  });
}
document.querySelectorAll('.a11y-opt').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const a = btn.getAttribute('data-action');
    if(a==='font-up') a11ySettings.fontUp = Math.min(2, (a11ySettings.fontUp||0)+1);
    if(a==='font-down') a11ySettings.fontUp = Math.max(0, (a11ySettings.fontUp||0)-1);
    if(a==='grayscale') a11ySettings.grayscale = !a11ySettings.grayscale;
    if(a==='contrast') a11ySettings.contrast = !a11ySettings.contrast;
    if(a==='links') a11ySettings.links = !a11ySettings.links;
    if(a==='motion') a11ySettings.motion = !a11ySettings.motion;
    if(a==='reset') a11ySettings = {};
    try{ localStorage.setItem('a11y', JSON.stringify(a11ySettings)); }catch(e){}
    applyA11y();
  });
});
applyA11y();

// Gallery slider — arrows + dots
const slider = document.getElementById('gallerySlider');
const dotsContainer = document.getElementById('galleryDots');
const prevBtn = document.querySelector('.gallery-arrow.prev');
const nextBtn = document.querySelector('.gallery-arrow.next');
if(slider && dotsContainer){
  const isRTL = document.documentElement.dir === 'rtl';
  function buildDots(){
    const pages = Math.max(1, Math.ceil(slider.scrollWidth / slider.clientWidth));
    dotsContainer.innerHTML = '';
    for(let i=0;i<pages;i++){
      const dot = document.createElement('span');
      if(i===0) dot.classList.add('active');
      dotsContainer.appendChild(dot);
    }
  }
  function updateDots(){
    const dots = dotsContainer.querySelectorAll('span');
    if(!dots.length) return;
    const pos = Math.abs(slider.scrollLeft) / slider.clientWidth;
    const idx = Math.min(dots.length-1, Math.round(pos));
    dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
  }
  function scrollByStep(dir){
    const step = slider.clientWidth * 0.6;
    slider.scrollBy({left: (isRTL ? -1 : 1) * dir * step, behavior:'smooth'});
  }
  if(prevBtn) prevBtn.addEventListener('click', ()=>scrollByStep(-1));
  if(nextBtn) nextBtn.addEventListener('click', ()=>scrollByStep(1));
  slider.addEventListener('scroll', updateDots, {passive:true});
  window.addEventListener('resize', ()=>{ buildDots(); centerScroll(); updateDots(); });
  function centerScroll(){
    const mid = (slider.scrollWidth - slider.clientWidth) / 2;
    slider.scrollLeft = isRTL ? -mid : mid;
  }
  // Initial setup — wait a tick for layout, then center
  setTimeout(()=>{ buildDots(); centerScroll(); updateDots(); }, 100);
}
